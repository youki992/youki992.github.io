name: Sync WeChat RSS to Articles

on:
  workflow_dispatch:
  schedule:
    - cron: '10 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync RSS -> js/articles-data.js
        env:
          WECHAT_RSS_URL: ${{ secrets.WECHAT_RSS_URL }}
        run: |
          python scripts/sync_rss_to_articles.py

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/articles-data.js
          git commit -m "chore: sync wechat articles from rss"
          git push
